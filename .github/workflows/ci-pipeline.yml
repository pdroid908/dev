name: DevOps Security & Build Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pemeriksaan-kode:
    runs-on: ubuntu-latest

    steps:
    - name: Mengambil kode dari GitHub
      uses: actions/checkout@v4

    - name: Menjalankan Scan Kualitas Kode
      run: |
        echo "=== MEMULAI SCAN KUALITAS KODE ==="
        echo "Memeriksa bug dan kerapihan kode..."
        echo "Scan Selesai: Kodingan Rapih!"

    - name: Menjalankan Scan Celah Keamanan Nexus
      run: |
        echo "=== MEMULAI NEXUS / SNYK VULNERABILITY SCAN ==="
        echo "Mengecek apakah ada library berbahaya..."
        echo "🚨 [BAHAYA] Ditemukan celah keamanan High-Risk pada library!"
        echo "Menolak kodingan secara otomatis..."
        exit 1
